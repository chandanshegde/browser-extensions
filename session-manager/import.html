<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Sessions - Session Manager</title>
  <style>
    :root {
      --primary-color: #4285f4;
      --primary-hover: #3367d6;
      --success-color: #34a853;
      --error-color: #ea4335;
      --background: #ffffff;
      --surface: #f8f9fa;
      --border: #dadce0;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --hover-bg: #f1f3f4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--background);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .upload-section {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      margin-bottom: 24px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .upload-section:hover {
      border-color: var(--primary-color);
      background: var(--selected-bg);
    }

    .upload-section.drag-over {
      border-color: var(--primary-color);
      background: var(--selected-bg);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      color: var(--text-secondary);
    }

    .upload-text {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .upload-hint {
      font-size: 13px;
      color: var(--text-secondary);
    }

    #file-input {
      display: none;
    }

    .preview-section {
      margin-bottom: 24px;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .preview-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--hover-bg);
    }

    .sessions-preview {
      border: 1px solid var(--border);
      border-radius: 6px;
      max-height: 300px;
      overflow-y: auto;
    }

    .session-preview-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .session-preview-item:last-child {
      border-bottom: none;
    }

    .session-preview-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .session-preview-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .message {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .message.success {
      background: #e6f4ea;
      color: var(--success-color);
      border: 1px solid #ceead6;
    }

    .message.error {
      background: #fce8e6;
      color: var(--error-color);
      border: 1px solid #fad2cf;
    }

    .hidden {
      display: none;
    }

    .no-preview {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary-color);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="popup.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M11 4.5H5l3-3 1.5 1.5L7.5 8l5.5 5.5-1.5 1.5-3-3.5H5v-6h6z"/>
      </svg>
      Back to Session Manager
    </a>

    <header>
      <h1>Import Sessions</h1>
      <p class="subtitle">Import sessions from a previously exported JSON file. You can import individual sessions or multiple sessions at once.</p>
    </header>

    <div id="message" class="message hidden"></div>

    <div class="upload-section" id="upload-section">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
      </svg>
      <div class="upload-text">Click to select or drag and drop</div>
      <div class="upload-hint">Supports JSON files exported from Session Manager</div>
      <input type="file" id="file-input" accept=".json">
    </div>

    <div class="preview-section hidden" id="preview-section">
      <div class="preview-header">
        <h2>Sessions to Import</h2>
        <button id="btn-import" class="btn btn-primary">Import Sessions</button>
      </div>
      <div class="sessions-preview" id="sessions-preview"></div>
    </div>
  </div>

  <script src="import.js"></script>
</body>
</html>
